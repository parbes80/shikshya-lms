{% extends 'base.html' %}
{% block title %}Forgot Password{% endblock %}
{% block content %}
<div style="max-width: 450px; margin: 2rem auto; padding: 1rem;">
  <div class="card" style="padding: 2.5rem; position: relative; overflow: hidden;">
    <div style="position: absolute; top: 0; left: 0; right: 0; height: 6px; background: linear-gradient(90deg, var(--primary), var(--secondary));"></div>
    <div style="text-align: center; margin-bottom: 2rem;">
      <i class="fas fa-key" style="font-size: 3rem; color: var(--primary); margin-bottom: 1rem;"></i>
      <h2 style="font-size: 1.8rem; font-weight: 800;">Forgot Password</h2>
      <p style="color: var(--text-muted); font-size: 0.9rem; margin-top: 0.25rem;">Enter your email and an admin will send you a reset link</p>
    </div>
    <form method="POST">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div class="form-group">
        <label class="form-label" for="email">Email Address</label>
        <input type="email" name="email" id="email" class="form-control" placeholder="name@example.com" required>
      </div>
      <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center; margin-top: 1rem;">
        <i class="fas fa-paper-plane"></i> Submit Request
      </button>
    </form>
    <div style="text-align: center; margin-top: 1.5rem; font-size: 0.9rem;">
      <a href="{{ url_for('auth.login') }}" style="color: var(--primary); font-weight: 600;">Back to Login</a>
    </div>
  </div>
</div>
{% endblock %}
