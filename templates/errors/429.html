{% extends 'base.html' %}
{% block title %}Too Many Requests{% endblock %}

{% block content %}
<div style="display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 60vh; text-align: center; padding: 2rem;">
  <i class="fas fa-hourglass-half" style="font-size: 5rem; color: var(--accent); margin-bottom: 1.5rem;"></i>
  <h1 style="font-size: 2.5rem; margin-bottom: 1rem;">429 - Too Many Requests</h1>
  <p style="color: var(--text-muted); font-size: 1.1rem; max-width: 500px; margin-bottom: 2rem;">
    You have made too many requests in a short period. Please wait a moment and try again.
  </p>
  <a href="{{ url_for('main.home') }}" class="btn btn-primary"><i class="fas fa-home"></i> Return Home</a>
</div>
{% endblock %}
