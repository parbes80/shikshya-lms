{% extends 'base.html' %}
{% block title %}Schedule Live Class{% endblock %}

{% block content %}
<div style="max-width: 600px; margin: 3rem auto; padding: 1rem;">
  <div class="card" style="padding: 2.5rem;">
    <div style="display: flex; align-items: center; gap: 1rem; margin-bottom: 2rem;">
      <div style="width: 48px; height: 48px; border-radius: 50%; background: var(--primary-light); display: flex; align-items: center; justify-content: center; color: var(--primary); font-size: 1.3rem;">
        <i class="fas fa-video"></i>
      </div>
      <div>
        <h2 style="font-size: 1.5rem;">Schedule Live Class</h2>
        <p style="color: var(--text-muted); font-size: 0.85rem;">Course: <strong>{{ course.title }}</strong></p>
      </div>
    </div>

    <form method="POST">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

      <div class="form-group">
        <label class="form-label">Class Title *</label>
        <input type="text" name="title" class="form-control" placeholder="e.g. Week 1: Python Variables" required>
      </div>

      <div class="form-group">
        <label class="form-label">Google Meet Link</label>
        <input type="url" name="meet_link" class="form-control" placeholder="https://meet.google.com/xxx-xxxx-xxx">
        <small style="color: var(--text-muted); font-size: 0.75rem;">Paste your Google Meet link here. Students will use this to join.</small>
      </div>

      <div class="form-group">
        <label class="form-label">Description</label>
        <textarea name="description" rows="3" class="form-control" placeholder="Topics to cover, prerequisites, etc."></textarea>
      </div>

      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
        <div class="form-group">
          <label class="form-label">Date *</label>
          <input type="date" name="date" class="form-control" required>
        </div>
        <div class="form-group">
          <label class="form-label">Time *</label>
          <input type="time" name="time" class="form-control" required>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Duration (minutes)</label>
        <input type="number" name="duration_minutes" class="form-control" value="60" min="15" max="300">
      </div>

      <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center;">
        <i class="fas fa-calendar-plus"></i> Schedule Class
      </button>
    </form>
  </div>
</div>
{% endblock %}
