<!DOCTYPE html>
<html>
<head><meta charset="utf-8"></head>
<body style="font-family: Arial, sans-serif; background: #f4f4f6; padding: 2rem 1rem;">
  <div style="max-width: 480px; margin: 0 auto; background: #fff; border-radius: 12px; overflow: hidden; box-shadow: 0 2px 12px rgba(0,0,0,0.08);">
    <div style="background: #6366f1; padding: 1.5rem; text-align: center;">
      <h1 style="color: #fff; margin: 0; font-size: 1.25rem;">{{ site_name }}</h1>
    </div>
    <div style="padding: 2rem;">
      <h2 style="margin: 0 0 0.5rem; font-size: 1.1rem; color: #1f2937;">Password Reset</h2>
      <p style="color: #6b7280; font-size: 0.9rem; line-height: 1.5;">Hello <strong>{{ username }}</strong>,</p>
      <p style="color: #6b7280; font-size: 0.9rem; line-height: 1.5;">You requested a password reset. Click the button below to set a new password. This link expires in <strong>24 hours</strong>.</p>
      <div style="text-align: center; margin: 2rem 0;">
        <a href="{{ reset_link }}" style="display: inline-block; background: #6366f1; color: #fff; padding: 0.75rem 2rem; border-radius: 8px; text-decoration: none; font-weight: 600;">Reset Password</a>
      </div>
      <p style="color: #9ca3af; font-size: 0.8rem;">If you didn't request this, you can safely ignore this email.</p>
    </div>
    <div style="text-align: center; padding: 1rem; border-top: 1px solid #e5e7eb;">
      <p style="color: #9ca3af; font-size: 0.75rem; margin: 0;">&copy; {{ site_name }} &middot; All rights reserved.</p>
    </div>
  </div>
</body>
</html>
