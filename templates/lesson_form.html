{% extends 'base.html' %}
{% block title %}Add Lesson{% endblock %}

{% block content %}
<div style="max-width: 800px; margin: 2rem auto; padding: 1rem;">
  <div style="margin-bottom: 2rem;">
    <h1 class="section-title">Add Lesson</h1>
    <p style="color: var(--text-muted); margin-top: 0.25rem;">
      Course: <strong>{{ module.course.title }}</strong> &middot; Chapter: <strong>{{ module.title }}</strong>
    </p>
  </div>

  <div class="card" style="padding: 2.5rem;">
    <form method="POST">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

      <div style="display: grid; grid-template-columns: 2fr 1fr; gap: 1.5rem;">
        <div>
          <div class="form-group">
            <label class="form-label">Lesson Title *</label>
            <input type="text" name="lesson_title" class="form-control" placeholder="e.g. Variables and Data Types" required>
          </div>
        </div>
        <div>
          <div class="form-group">
            <label class="form-label">Content Type</label>
            <select name="content_type" class="form-control" required>
              <option value="video">Video Lecture</option>
              <option value="pdf">Document / PDF Notes</option>
            </select>
          </div>
        </div>
      </div>

      <div style="display: grid; grid-template-columns: 2fr 1fr; gap: 1.5rem;">
        <div class="form-group">
          <label class="form-label">Video Source Link (if Video)</label>
          <input type="text" name="video_url" class="form-control" placeholder="https://www.w3schools.com/html/mov_bbb.mp4" value="https://www.w3schools.com/html/mov_bbb.mp4">
        </div>
        <div class="form-group">
          <label class="form-label">Duration (minutes)</label>
          <input type="number" name="duration" class="form-control" value="10" min="1" required>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Lecture Notes (Rich Text Editor)</label>
        <div id="lesson-editor" style="min-height: 300px; background: white; color: #1e293b; border-radius: var(--radius-sm); border: 1px solid var(--border-color);"></div>
        <input type="hidden" name="text_content" id="text-content-hidden">
      </div>

      <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center; margin-top: 1rem;">
        <i class="fas fa-plus"></i> Add Lesson
      </button>
    </form>
  </div>
</div>
{% endblock %}

{% block extra_js %}
<link href="https://cdn.quilljs.com/1.3.7/quill.snow.css" rel="stylesheet">
<script src="https://cdn.quilljs.com/1.3.7/quill.min.js"></script>
<script>
  var editor = new Quill('#lesson-editor', {
    theme: 'snow',
    placeholder: 'Write your lecture notes here... Include real-world examples, code demos, and use cases.',
    modules: {
      toolbar: [
        [{ 'header': [1,2,3,false] }],
        ['bold', 'italic', 'underline', 'strike'],
        [{ 'color': [] }, { 'background': [] }],
        [{ 'list': 'ordered'}, { 'list': 'bullet' }],
        [{ 'indent': '-1'}, { 'indent': '+1' }],
        ['blockquote', 'code-block'],
        [{ 'align': [] }],
        ['link', 'image'],
        ['clean']
      ]
    }
  });

  document.querySelector('form').addEventListener('submit', function() {
    document.getElementById('text-content-hidden').value = editor.root.innerHTML;
  });
</script>
{% endblock %}
