{% extends 'base.html' %}
{% block title %}{% if action == 'create' %}New Notice{% else %}Edit Notice{% endif %}{% endblock %}

{% block content %}
<div style="max-width: 700px; margin: 3rem auto; padding: 1rem;">
  <div class="card" style="padding: 2.5rem;">
    <div style="display: flex; align-items: center; gap: 1rem; margin-bottom: 2rem;">
      <div style="width: 48px; height: 48px; border-radius: 50%; background: var(--primary-light); display: flex; align-items: center; justify-content: center; color: var(--primary); font-size: 1.3rem;">
        <i class="fas fa-bullhorn"></i>
      </div>
      <div>
        <h2 style="font-size: 1.5rem;">{% if action == 'create' %}Publish Notice{% else %}Edit Notice{% endif %}</h2>
        <p style="color: var(--text-muted); font-size: 0.85rem;">Share an announcement with students, teachers, or everyone.</p>
      </div>
    </div>

    <form method="POST">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

      <div class="form-group">
        <label class="form-label">Title *</label>
        <input type="text" name="title" class="form-control" value="{{ notice.title if notice else '' }}" placeholder="e.g. Holiday Announcement" required>
      </div>

      <div class="form-group">
        <label class="form-label">Content *</label>
        <textarea name="content" rows="6" class="form-control" placeholder="Write your announcement details here..." required>{{ notice.content if notice else '' }}</textarea>
      </div>

      <div class="form-group">
        <label class="form-label">Target Audience</label>
        <select name="target_role" class="form-control">
          <option value="all" {% if notice and notice.target_role == 'all' %}selected{% endif %}>Everyone</option>
          <option value="student" {% if notice and notice.target_role == 'student' %}selected{% endif %}>Students Only</option>
          <option value="teacher" {% if notice and notice.target_role == 'teacher' %}selected{% endif %}>Teachers Only</option>
          <option value="admin" {% if notice and notice.target_role == 'admin' %}selected{% endif %}>Admins Only</option>
        </select>
      </div>

      <div class="form-group" style="display: flex; align-items: center; gap: 0.5rem;">
        <input type="checkbox" name="is_pinned" id="is_pinned" {% if notice and notice.is_pinned %}checked{% endif %} style="accent-color: var(--primary);">
        <label for="is_pinned"> Pin this notice (shows at top)</label>
      </div>

      <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center;">
        <i class="fas fa-paper-plane"></i> {% if action == 'create' %}Publish Notice{% else %}Save Changes{% endif %}
      </button>
    </form>
  </div>
</div>
{% endblock %}
