version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: shikshya_db
    restart: always
    environment:
      POSTGRES_USER: shikshya
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change_me_in_production}
      POSTGRES_DB: shikshya
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shikshya"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: shikshya_web
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      - FLASK_ENV=production
      - SECRET_KEY=${SECRET_KEY}
      - DATABASE_URL=postgresql://shikshya:${DB_PASSWORD:-change_me_in_production}@db:5432/shikshya
      - SESSION_COOKIE_SECURE=True
      - SITE_URL=${SITE_URL:-http://localhost}
      - MAIL_SERVER=${MAIL_SERVER:-}
      - MAIL_PORT=${MAIL_PORT:-587}
      - MAIL_USE_TLS=${MAIL_USE_TLS:-true}
      - MAIL_USERNAME=${MAIL_USERNAME:-}
      - MAIL_PASSWORD=${MAIL_PASSWORD:-}
      - MAIL_DEFAULT_SENDER=${MAIL_DEFAULT_SENDER:-}
      - RATELIMIT_STORAGE_URL=${RATELIMIT_STORAGE_URL:-memory://}
    env_file:
      - .env
    volumes:
      - uploads:/app/static/uploads
    expose:
      - "5000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  nginx:
    image: nginx:alpine
    container_name: shikshya_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      web:
        condition: service_healthy
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./static:/usr/share/nginx/html/static:ro
      - uploads:/usr/share/nginx/html/uploads:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro

volumes:
  pgdata:
  uploads:
